<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相册 - Dylankwal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        .photo-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 4/3;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .photo-card:hover {
            transform: scale(1.02);
        }
        
        .photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        .photo-placeholder .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .photo-placeholder .desc {
            font-size: 1rem;
            opacity: 0.9;
        }
        
        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            padding: 1.5rem;
        }
        
        .photo-overlay h4 {
            margin-bottom: 0.3rem;
        }
        
        .photo-overlay p {
            font-size: 0.85rem;
            opacity: 0.8;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #888;
            grid-column: 1 / -1;
        }
        
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html">首页</a>
            <a href="index.html#about">关于</a>
            <a href="index.html#interests">兴趣</a>
            <a href="gallery.html">相册</a>
            <a href="blog.html">博客</a>
            <a href="message.html">留言</a>
            <a href="index.html#contact">联系</a>
        </nav>
    </header>

    <section style="padding-top: 8rem;">
        <h2>🖼️ 照片墙</h2>
        
        <div class="photo-grid" id="photo-container">
            <!-- 照片由JS加载 -->
        </div>
    </section>

    <footer>
        <p>© 2026 Dylankwal. 用心生活，天天向上。</p>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        // Firebase 配置（你的项目）
        const firebaseConfig = {
            apiKey: "AIzaSyAcrFCK-nYFNDuAh3GbdM1U-Td458V5ILQ",
            authDomain: "my-website-data-188e6.firebaseapp.com",
            databaseURL: "https://my-website-data-188e6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-website-data-188e6",
            storageBucket: "my-website-data-188e6.firebasestorage.app",
            messagingSenderId: "693388911917",
            appId: "1:693388911917:web:b54134ae1e02db47749fa4"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        document.addEventListener('DOMContentLoaded', function() {
            loadGallery();
            loadName();
        });
        
        function loadName() {
            const profileRef = db.ref('profile');
            profileRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.name) {
                    document.querySelector('footer p').innerHTML = 
                        '© 2026 ' + data.name + '. 用心生活，天天向上。';
                }
            });
        }
        
        function loadGallery() {
            const photosRef = db.ref('photos');
            const container = document.getElementById('photo-container');
            
            // 默认照片
            const defaultPhotos = [
                { icon: '🌅', title: '日落时分', detail: '城市边缘的晚霞' },
                { icon: '🏔️', title: '山野漫步', detail: '亲近大自然' },
                { icon: '☕', title: '咖啡下午茶', detail: '周末的悠闲时光' },
                { icon: '🌊', title: '海边日落', detail: '聆听海浪声' },
                { icon: '🌸', title: '街头巷尾', detail: '发现城市之美' },
                { icon: '🎬', title: '电影之夜', detail: '重温经典老片' }
            ];
            
            photosRef.on('value', (snapshot) => {
                const data = snapshot.val();
                
                if (data) {
                    // Firebase 数据存在
                    const photos = Object.values(data);
                    container.innerHTML = photos.map(p => `
                        <div class="photo-card">
                            <div class="photo-placeholder" style="background: linear-gradient(135deg, ${getRandomColor()} 0%, ${getRandomColor()} 100%);">
                                <span class="icon">${p.icon}</span>
                                <span class="desc">${p.title}</span>
                            </div>
                            <div class="photo-overlay">
                                <h4>${p.title}</h4>
                                <p>${p.detail || ''}</p>
                            </div>
                        </div>
                    `).join('');
                } else {
                    // 使用默认照片
                    container.innerHTML = defaultPhotos.map(p => `
                        <div class="photo-card">
                            <div class="photo-placeholder" style="background: linear-gradient(135deg, ${getRandomColor()} 0%, ${getRandomColor()} 100%);">
                                <span class="icon">${p.icon}</span>
                                <span class="desc">${p.title}</span>
                            </div>
                            <div class="photo-overlay">
                                <h4>${p.title}</h4>
                                <p>${p.detail || ''}</p>
                            </div>
                        </div>
                    `).join('');
                }
            }, (error) => {
                // 出错时使用默认
                container.innerHTML = defaultPhotos.map(p => `
                    <div class="photo-card">
                        <div class="photo-placeholder" style="background: linear-gradient(135deg, ${getRandomColor()} 0%, ${getRandomColor()} 100%);">
                            <span class="icon">${p.icon}</span>
                            <span class="desc">${p.title}</span>
                        </div>
                        <div class="photo-overlay">
                            <h4>${p.title}</h4>
                            <p>${p.detail || ''}</p>
                        </div>
                    </div>
                `).join('');
            });
        }
        
        function getRandomColor() {
            const colors = ['#667eea', '#764ba2', '#11998e', '#38ef7d', '#ee0979', '#ff6a00', '#4facfe', '#00f2fe', '#fa709a', '#fee140'];
            return colors[Math.floor(Math.random() * colors.length)];
        }
    </script>
</body>
</html>
