<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客 - Dylankwal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .blog-list {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .blog-item {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        
        .blog-item:hover {
            transform: translateY(-5px);
        }
        
        .blog-date {
            color: #e94560;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        
        .blog-item h3 {
            color: #1a1a2e;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }
        
        .blog-item p {
            color: #666;
            line-height: 1.8;
        }
        
        .read-more {
            display: inline-block;
            margin-top: 1rem;
            color: #e94560;
            text-decoration: none;
            font-weight: 500;
        }
        
        .read-more:hover {
            text-decoration: underline;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #888;
        }
        
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .empty-state p {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html">首页</a>
            <a href="index.html#about">关于</a>
            <a href="index.html#interests">兴趣</a>
            <a href="gallery.html">相册</a>
            <a href="blog.html">博客</a>
            <a href="message.html">留言</a>
            <a href="index.html#contact">联系</a>
        </nav>
    </header>

    <section style="padding-top: 8rem;">
        <h2>📝 我的博客</h2>
        <div class="blog-list" id="blog-container">
            <!-- 文章由JS加载 -->
            <div class="empty-state" id="loading">
                <div class="icon">📝</div>
                <p>加载中...</p>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 Dylankwal. 用心生活，天天向上。</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadBlog();
            loadName();
        });
        
        function loadName() {
            const profile = JSON.parse(localStorage.getItem('siteProfile') || '{}');
            if (profile.name) {
                document.querySelector('footer p').innerHTML = 
                    '© 2026 ' + profile.name + '. 用心生活，天天向上。';
            }
        }
        
        function loadBlog() {
            const articles = JSON.parse(localStorage.getItem('siteArticles') || '[]');
            const container = document.getElementById('blog-container');
            
            // 默认文章
            const defaultArticles = [
                {
                    title: '第一次尝试徒步',
                    date: '2026-06-28',
                    content: '上周和朋友去了一趟郊外徒步，虽然很累，但看到山顶的风景那一刻，觉得一切都值了。大自然的魅力真的无法用语言形容，下次还要去！'
                },
                {
                    title: '学习摄影的第一个月',
                    date: '2026-06-20',
                    content: '最近开始认真学摄影，从最基础的构图学起。虽然拍出来的照片还很普通，但每次按下快门的那一刻都让我感到满足。继续加油！'
                },
                {
                    title: '最近在读的几本书',
                    date: '2026-06-15',
                    content: '最近迷上了悬疑小说，一口气读完了三本东野圭吾的书。推荐《白夜行》，人物刻画太深刻了。除了小说，也在看一些心理学入门的书籍。'
                }
            ];
            
            // 合并：用户添加的文章优先
            const allArticles = articles.length > 0 ? articles : defaultArticles;
            
            if (allArticles.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">✍️</div>
                        <p>还没有文章</p>
                        <p style="font-size:0.9rem;margin-top:0.5rem;">去后台添加文章吧！</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = allArticles.map(a => `
                <article class="blog-item">
                    <div class="blog-date">${formatDate(a.date)}</div>
                    <h3>${a.title}</h3>
                    <p>${a.content}</p>
                </article>
            `).join('');
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }
    </script>
</body>
</html>
